# ============================================================================
# APPLICATION
# ============================================================================
# Nom technique de l'application utilisť par Spring Boot dans le profil DEV.
# Cette valeur facilite l'identification de l'application dans les logs.
# ============================================================================

spring.application.name=magiclibrary_dev_wip

# ============================================================================
# SERVEUR WEB
# ============================================================================
# Port HTTP utilisť localement pendant le dťveloppement.
# ============================================================================

server.port=8080

# ============================================================================
# BASE DE DONN…ES MARIA DB
# ============================================================================
# Configuration de la base relationnelle utilisťe par le projet.
# Ce profil pointe vers l'environnement de dťveloppement local.
# ============================================================================

spring.datasource.url=jdbc:mariadb://localhost:3306/magiclibrary_dev_wip?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ============================================================================
# JPA / HIBERNATE
# ============================================================================
# ParamŤtres de persistance utilisťs pendant le dťveloppement.
#
# ddl-auto=update :
# Met ŗ jour automatiquement le schťma de base de donnťes sans supprimer
# les donnťes existantes.
#
# show-sql et format_sql :
# Facilitent l'analyse des requÍtes gťnťrťes par Hibernate.
# ============================================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================================
# JOURNALISATION
# ============================================================================
# Niveau de logs renforcť afin de faciliter le dťbogage local :
# - Spring MVC
# - Spring Security
# - Gestion des exceptions
# - RequÍtes SQL Hibernate
# - ParamŤtres SQL transmis ŗ la base
# ============================================================================

logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ============================================================================
# GESTION DES ERREURS
# ============================================================================
# Affiche un maximum d'informations lors du dťveloppement afin de faciliter
# l'identification des problŤmes applicatifs.
# ============================================================================

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# ============================================================================
# MONGODB
# ============================================================================
# Base NoSQL utilisťe exclusivement pour le module CONTACT.
# ============================================================================

spring.data.mongodb.uri=mongodb://localhost:27017/magiclibrary_dev_wip_nosql

# ============================================================================
# JWT
# ============================================================================
# ParamŤtres de sťcuritť utilisťs pour la gťnťration et la validation
# des jetons d'authentification.
#
# expiration :
# 24 heures.
#
# expirationRememberMe :
# 7 jours.
# ============================================================================

spring.app.jwt.secret=UneCleDevUltraLongueEtVraimentTresSecurisee_2025!!!
spring.app.jwt.expiration=86400000
spring.app.jwt.expirationRememberMe=604800000

# ============================================================================
# REMEMBER ME
# ============================================================================
# Clť utilisťe par le mťcanisme Remember-Me de Spring Security dans
# l'environnement de dťveloppement.
# ============================================================================

spring.app.security.remember-me.key=MagicLibraryRememberMeKey_Dev_2026_StrongValue