<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandbox boutons carte membre</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 p-8">

<main class="mx-auto max-w-4xl">
    <h1 class="mb-8 text-2xl font-semibold text-gray-900">
        Sandbox fidèle — carte membre réelle
    </h1>

    <section class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">

        <article class="max-w-[460px] rounded-lg border border-gray-200 bg-white p-4 shadow-sm">

            <div class="flex min-h-[170px] flex-col justify-between">

                <div class="flex justify-between gap-4">

                    <div class="min-w-0 flex-1">
                        <h2 class="text-base font-semibold text-gray-900">
                            JeanPierre Pont
                        </h2>

                        <p class="mt-3 break-words text-sm text-gray-700">
                            jp.pont@example.com
                        </p>

                        <p class="mt-3 text-sm text-gray-700">
                            MEMBRE <span class="text-gray-400">•</span>
                            Cotisation OK <span class="text-gray-400">•</span>
                            ID <span class="font-medium text-gray-900">7</span>
                        </p>
                    </div>

                    <div class="flex flex-col items-end gap-2">

              <span class="inline-flex min-w-[7.5rem] justify-center rounded-full bg-blue-50 px-3 py-1 text-xs font-medium text-blue-900 ring-1 ring-blue-200">
                MEMBRE
              </span>

                        <span class="inline-flex min-w-[7.5rem] justify-center rounded-full bg-blue-50 px-3 py-1 text-xs font-medium text-blue-900 ring-1 ring-blue-200">
                Cotisation OK
              </span>

                    </div>

                </div>

                <div class="mt-8 flex items-end justify-between">

                    <a href="#"
                       class="inline-flex min-h-10 min-w-[96px] items-center justify-center rounded-md border border-gray-200 bg-white px-4 py-2 text-sm font-semibold text-blue-700 shadow-sm hover:bg-gray-50">
                        Voir
                    </a>

                    <a href="#"
                       class="inline-flex min-h-10 min-w-[110px] items-center justify-center rounded-md border border-gray-200 bg-white px-4 py-2 text-sm font-semibold text-blue-700 shadow-sm hover:bg-gray-50">
                        Modifier
                    </a>

                </div>

            </div>

        </article>

    </section>
</main>

</body>
</html>
