<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NavbarProfileSandboxCompactFinal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">

<header class="border-b border-slate-200 bg-white">

            </div>

                MagicLibrary

        <button type="button"

            <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

                <span class="inline-flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-indigo-800 text-base font-semibold text-slate-100 shadow-sm">
                    PM
                </span>

                <div class="min-w-0">
                    <p class="max-w-[150px] truncate text-base font-semibold text-slate-900">

                    </p>
                    <p class="text-sm font-medium text-blue-700">

                    </p>

                <button type="button"

                    <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 24 24" fill="none">

                        <path d="M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

    </div>
