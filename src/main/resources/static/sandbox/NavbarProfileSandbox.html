<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">

<header class="bg-white border-b border-slate-200">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4">

        <div class="flex items-center gap-3">
            <div class="h-12 w-12 rounded border border-slate-200 flex items-center justify-center text-xs font-bold">
                LOGO
            </div>
            <span class="text-lg font-semibold">MagicLibrary</span>
        </div>

        <div class="flex items-center gap-3">

            <div class="hidden min-[540px]:flex items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">

                <span class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-slate-950 text-sm font-semibold text-white">
                    LN
                </span>

                <div class="min-w-0">
                    <p class="max-w-[150px] truncate text-sm font-semibold text-slate-900">
                        Lalalala Ninninin
                    </p>

                    <span class="mt-1 inline-flex min-h-6 items-center rounded-full border border-slate-300 bg-slate-900 px-2.5 text-[11px] font-semibold uppercase tracking-wide text-white">
                        ADMIN
                    </span>
                </div>

            </div>

            <button class="inline-flex min-h-10 min-w-11 items-center justify-center rounded-md border border-slate-300 bg-white px-3 py-2">
                ☰
            </button>

        </div>

    </div>
</header>

</body>
</html>
