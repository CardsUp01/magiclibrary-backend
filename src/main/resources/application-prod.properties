# ============================================================================
# APPLICATION
# ============================================================================
# Nom technique de l'application Spring Boot.
# Utilisé pour identifier le service dans les logs et environnements cloud.
# ============================================================================

spring.application.name=magiclibrary

# ============================================================================
# SERVEUR WEB
# ============================================================================
# Railway injecte automatiquement la variable d'environnement PORT.
# La valeur 8080 sert uniquement de fallback local si PORT est absent.
# ============================================================================
server.port=${PORT:8080}

# ============================================================================
# BASE DE DONNÉES MARIA DB (PRODUCTION RAILWAY)
# ============================================================================
# Connexion sécurisée ŕ la base relationnelle hébergée sur Railway.
# Toutes les valeurs sensibles sont injectées via variables d'environnement
# afin d'éviter toute exposition dans le code source.
# ============================================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ============================================================================
# JPA / HIBERNATE - STRATÉGIE DE SCHÉMA (FIX CRITIQUE)
# ============================================================================
#
# ? PROBLČME INITIAL :
# ddl-auto=none empęchait Hibernate de créer les tables en production.
# ? Résultat : crash "Table 'user' doesn't exist" sur Railway.
#
# ? CORRECTION APPLIQUÉE :
# ddl-auto=update permet ŕ Hibernate de :
#   - créer automatiquement les tables manquantes
#   - adapter le schéma ŕ l'entité Java
#   - éviter les crashs sur base vide Railway
#
# ? IMPORTANT :
# En production avancée (niveau industriel), on remplacera ceci par Flyway
# ou Liquibase pour un contrôle strict du schéma.
# ============================================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ============================================================================
# MONGODB (MODULE CONTACT)
# ============================================================================
# Base NoSQL dédiée au module de contact utilisateur.
# Indépendante de la base relationnelle MariaDB.
# ============================================================================

spring.data.mongodb.uri=${MONGODB_URI}

# ============================================================================
# JWT - AUTHENTIFICATION
# ============================================================================
# Configuration de sécurité pour authentification stateless.
# Tokens utilisés pour sécuriser les endpoints REST.
#
# expiration : durée de validité standard (24h)
# remember-me : durée étendue (7 jours)
# ============================================================================

spring.app.jwt.secret=${JWT_SECRET}
spring.app.jwt.expiration=${JWT_EXPIRATION:86400000}
spring.app.jwt.expirationRememberMe=${JWT_EXPIRATION_REMEMBER_ME:604800000}

# ============================================================================
# REMEMBER ME (SPRING SECURITY)
# ============================================================================
# Clé utilisée pour maintenir une session utilisateur persistante.
# ============================================================================

spring.app.security.remember-me.key=${REMEMBER_ME_KEY}

# ============================================================================
# DOCUMENTATION API (PRODUCTION)
# ============================================================================
# Désactivation de Swagger pour éviter exposition des endpoints sensibles.
# ============================================================================

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ============================================================================
# LOGGING (PRODUCTION OPTIMISÉ)
# ============================================================================
# Réduction du bruit log + sécurité :
# - pas d'exposition SQL
# - logs Spring standard uniquement
# ============================================================================

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

# ============================================================================
# GESTION DES ERREURS (SÉCURITÉ)
# ============================================================================
# Empęche la fuite d'informations sensibles côté client.
# ============================================================================

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false