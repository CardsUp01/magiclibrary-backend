<nav th:fragment="nav"
     class="w-full border-b border-gray-200 bg-white shadow-sm"
     aria-label="Navigation principale"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- Conteneur principal de la barre de navigation -->
    <div class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex min-h-20 items-center gap-3 py-3">

            <!-- Identité de l'application et retour vers l'accueil -->
            <div class="flex min-w-0 items-center">
                <a th:href="@{/accueil}"
                   aria-label="MagicLibrary"
                   class="flex min-w-0 items-center gap-3 rounded-md focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white">
                    <img th:src="@{/img/Logo_MagiciensDabord_Amiens.png}"
                         alt="Logo MagicLibrary"
                         class="h-16 w-16 shrink-0 object-contain object-center sm:h-20 sm:w-20" />
                    <span class="hidden truncate text-lg font-semibold tracking-tight text-slate-900 sm:block">
                        MagicLibrary
                    </span>
                </a>
            </div>

            <div class="hidden h-10 w-px bg-slate-300 sm:block" aria-hidden="true"></div>

            <div class="ml-auto flex items-center justify-end gap-3">

                <!-- Avatar de l'utilisateur connecté -->
                <div sec:authorize="isAuthenticated()"
                     th:if="${currentUser != null}"
                     class="flex items-center">
                    <div class="inline-flex items-center">
                        <div class="shrink-0">
                            <img th:if="${currentUser != null and currentUser.avatar != null}"
                                 th:src="${currentUser.avatar}"
                                 th:alt="${'Avatar de ' + currentUser.displayName}"
                                 class="h-12 w-12 rounded-full object-cover shadow-sm" />
                            <span th:if="${currentUser != null and currentUser.avatar == null}"
                                  class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-indigo-800 text-base font-semibold text-slate-100 shadow-sm"
                                  th:attr="aria-label=${'Utilisateur connecté : ' + currentUser.displayName}"
                                  th:text="${currentUser.initials}">a
                                ML
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Bouton d'ouverture du menu principal -->
                <button type="button"
                        id="mobileMenuButton"
                        class="inline-flex min-h-11 min-w-11 shrink-0 items-center justify-center rounded-xl border border-slate-300 bg-white px-3 py-2 text-slate-800 shadow-sm hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white"
                        aria-label="Ouvrir le menu"
                        aria-controls="mobileMenuPanel"
                        aria-expanded="false">
                    <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 24 24" fill="none">
                        <path d="M4 6h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>

                <div id="mobileMenuOverlay"
                     class="hidden fixed inset-0 z-40 bg-black/30"
                     aria-hidden="true"></div>

                <!-- Panneau du menu principal affiché sous forme de dialogue -->
                <div id="mobileMenuPanel"
                     class="hidden fixed z-50 w-[calc(100vw-1rem)] max-w-sm origin-top-right overflow-auto rounded-xl border border-slate-200 bg-white shadow-xl"
                     role="dialog"
                     aria-modal="true"
                     aria-label="Menu principal">

                    <!-- Identité synthétique de l'utilisateur connecté dans le menu -->
                    <div sec:authorize="isAuthenticated()"
                         th:if="${currentUser != null}"
                         class="border-b border-slate-200 bg-slate-50 px-4 py-3">
                        <div class="min-w-0">
                            <p class="max-w-[220px] truncate text-base font-semibold text-slate-900">
                                <span th:if="${currentUser.civility != null}"
                                      th:text="${currentUser.civility}">
                                    M.
                                </span>
                                <th:block th:if="${currentUser.civility != null and currentUser.firstName != null}"> </th:block>
                                <span th:if="${currentUser.firstName != null}"
                                      th:text="${currentUser.firstName}">
                                    Prénom
                                </span>
                                <th:block th:if="${(currentUser.civility != null or currentUser.firstName != null) and currentUser.lastName != null}"> </th:block>
                                <span th:if="${currentUser.lastName != null}"
                                      class="uppercase"
                                      th:text="${currentUser.lastName}">
                                    NOM
                                </span>
                                <span th:if="${currentUser.civility == null and currentUser.firstName == null and currentUser.lastName == null}"
                                      th:text="${currentUser.displayName}">
                                    Utilisateur connecté
                                </span>
                            </p>
                            <p class="text-sm font-medium text-slate-800"
                               th:text="${currentUser.role}">
                                Administrateur
                            </p>
                        </div>
                    </div>

                    <!-- Liens de navigation adaptés au rôle de l'utilisateur -->
                    <div class="p-2">
                        <div class="flex flex-col">

                            <a sec:authorize="isAuthenticated()"
                               th:href="@{/accueil}"
                               th:attr="aria-current=${activePage == 'accueil'} ? 'page' : null"
                               class="relative rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-[current=page]:bg-slate-50 aria-[current=page]:font-semibold aria-[current=page]:text-slate-900">
                                <span class="pointer-events-none absolute bottom-1 left-0 top-1 w-1 rounded-full bg-blue-600 opacity-0 aria-[current=page]:opacity-100" aria-hidden="true"></span>
                                Accueil
                            </a>

                            <a sec:authorize="hasAnyRole('MEMBRE','ADMIN')"
                               th:href="@{/bibliotheque-numerique}"
                               th:attr="aria-current=${activePage == 'bibliotheque-numerique'} ? 'page' : null"
                               class="relative rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-[current=page]:bg-slate-50 aria-[current=page]:font-semibold aria-[current=page]:text-slate-900">
                                <span class="pointer-events-none absolute bottom-1 left-0 top-1 w-1 rounded-full bg-blue-600 opacity-0 aria-[current=page]:opacity-100" aria-hidden="true"></span>
                                Bibliothèque numérique
                            </a>

                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/admin/emprunts}"
                               th:attr="aria-current=${activePage == 'admin-loans'} ? 'page' : null"
                               class="relative rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-[current=page]:bg-slate-50 aria-[current=page]:font-semibold aria-[current=page]:text-slate-900">
                                <span class="pointer-events-none absolute bottom-1 left-0 top-1 w-1 rounded-full bg-blue-600 opacity-0 aria-[current=page]:opacity-100" aria-hidden="true"></span>
                                Emprunts
                            </a>

                            <a sec:authorize="hasRole('MEMBRE')"
                               th:href="@{/mes-emprunts}"
                               th:attr="aria-current=${activePage == 'mes-emprunts'} ? 'page' : null"
                               class="relative rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-[current=page]:bg-slate-50 aria-[current=page]:font-semibold aria-[current=page]:text-slate-900">
                                <span class="pointer-events-none absolute bottom-1 left-0 top-1 w-1 rounded-full bg-blue-600 opacity-0 aria-[current=page]:opacity-100" aria-hidden="true"></span>
                                Mes emprunts
                            </a>

                            <a sec:authorize="hasRole('MEMBRE')"
                               th:href="@{/mes-notifications}"
                               th:attr="aria-current=${activePage == 'mes-notifications'} ? 'page' : null"
                               class="relative rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-[current=page]:bg-slate-50 aria-[current=page]:font-semibold aria-[current=page]:text-slate-900">
                                <span class="pointer-events-none absolute bottom-1 left-0 top-1 w-1 rounded-full bg-blue-600 opacity-0 aria-[current=page]:opacity-100" aria-hidden="true"></span>
                                Mes notifications
                            </a>

                            <a sec:authorize="hasRole('MEMBRE')"
                               th:href="@{/mes-messages-de-contact}"
                               th:attr="aria-current=${activePage == 'mes-messages-de-contact'} ? 'page' : null"
                               class="relative rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-[current=page]:bg-slate-50 aria-[current=page]:font-semibold aria-[current=page]:text-slate-900">
                                <span class="pointer-events-none absolute bottom-1 left-0 top-1 w-1 rounded-full bg-blue-600 opacity-0 aria-[current=page]:opacity-100" aria-hidden="true"></span>
                                Mes messages de contact
                            </a>

                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/admin/membres}"
                               th:attr="aria-current=${activePage == 'admin-membres'} ? 'page' : null"
                               class="relative rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-[current=page]:bg-slate-50 aria-[current=page]:font-semibold aria-[current=page]:text-slate-900">
                                <span class="pointer-events-none absolute bottom-1 left-0 top-1 w-1 rounded-full bg-blue-600 opacity-0 aria-[current=page]:opacity-100" aria-hidden="true"></span>
                                Membres
                            </a>

                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/admin/messages}"
                               th:attr="aria-current=${activePage == 'admin-contacts'} ? 'page' : null"
                               class="relative rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-[current=page]:bg-slate-50 aria-[current=page]:font-semibold aria-[current=page]:text-slate-900">
                                <span class="pointer-events-none absolute bottom-1 left-0 top-1 w-1 rounded-full bg-blue-600 opacity-0 aria-[current=page]:opacity-100" aria-hidden="true"></span>
                                Messages
                            </a>

                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/admin/notifications}"
                               th:attr="aria-current=${activePage == 'admin-notifications'} ? 'page' : null"
                               class="relative rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-[current=page]:bg-slate-50 aria-[current=page]:font-semibold aria-[current=page]:text-slate-900">
                                <span class="pointer-events-none absolute bottom-1 left-0 top-1 w-1 rounded-full bg-blue-600 opacity-0 aria-[current=page]:opacity-100" aria-hidden="true"></span>
                                Notifications
                            </a>

                        </div>
                    </div>

                    <!-- Actions d'authentification selon l'état de connexion -->
                    <div class="flex items-center gap-2 border-t border-slate-200 bg-slate-50 p-3">
                        <a sec:authorize="isAnonymous()"
                           th:href="@{/login}"
                           class="inline-flex min-h-10 items-center justify-center rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-900 shadow-sm hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white">
                            Connexion
                        </a>

                        <form sec:authorize="isAuthenticated()"
                              th:action="@{/logout}"
                              method="post"
                              class="m-0">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />
                            <button type="submit"
                                    class="inline-flex min-h-10 items-center justify-center rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white">
                                Déconnexion
                            </button>
                        </form>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!--
        Gestion du menu principal responsive.
        Positionne le panneau, verrouille l'arrière-plan,
        gère la fermeture et maintient le focus dans le menu ouvert.
    -->
    <script>
        (function () {
            const nav = document.currentScript && document.currentScript.closest('nav');
            if (!nav) return;

            const btn = nav.querySelector('#mobileMenuButton');
            const panel = nav.querySelector('#mobileMenuPanel');
            const overlay = nav.querySelector('#mobileMenuOverlay');

            if (!btn || !panel || !overlay) return;

            function isOpen() {
                return !panel.classList.contains('hidden');
            }

            function positionPanel() {
                const gutter = 6;
                const rect = btn.getBoundingClientRect();
                const top = Math.round(rect.bottom + gutter);

                panel.style.top = top + 'px';

                const maxH = Math.max(160, window.innerHeight - top - gutter);
                panel.style.maxHeight = maxH + 'px';

                const forceFullWidth = window.innerWidth <= 260;

                if (forceFullWidth) {
                    panel.style.left = gutter + 'px';
                    panel.style.right = gutter + 'px';
                    panel.style.width = 'auto';
                    panel.style.maxWidth = 'none';
                    return;
                }

                panel.style.left = '';
                panel.style.width = '';
                panel.style.maxWidth = '';

                let right = Math.max(gutter, Math.round(window.innerWidth - rect.right));

                panel.style.right = right + 'px';

                const panelRect = panel.getBoundingClientRect();
                const panelWidth = panelRect.width;

                const maxRight = window.innerWidth - gutter - panelWidth;

                if (maxRight < gutter) {
                    panel.style.left = gutter + 'px';
                    panel.style.right = gutter + 'px';
                    panel.style.width = 'auto';
                    panel.style.maxWidth = 'none';
                    return;
                }

                right = Math.min(right, maxRight);
                right = Math.max(gutter, right);
                panel.style.right = Math.round(right) + 'px';
            }

            function focusFirstInPanel() {
                const current = panel.querySelector('a[aria-current="page"]');
                const firstLink = panel.querySelector('.flex.flex-col a');
                const target = current || firstLink || panel.querySelector('a, button, input, select, textarea, [tabindex]:not([tabindex="-1"])');
                if (target && typeof target.focus === 'function') target.focus();
            }

            function setOpen(open) {
                if (open) {
                    panel.classList.remove('hidden');
                    overlay.classList.remove('hidden');

                    btn.setAttribute('aria-expanded', 'true');
                    btn.setAttribute('aria-label', 'Fermer le menu');

                    document.body.style.overflow = 'hidden';

                    requestAnimationFrame(function () {
                        positionPanel();
                        requestAnimationFrame(function () {
                            positionPanel();
                            focusFirstInPanel();
                        });
                    });
                } else {
                    panel.classList.add('hidden');
                    overlay.classList.add('hidden');

                    btn.setAttribute('aria-expanded', 'false');
                    btn.setAttribute('aria-label', 'Ouvrir le menu');

                    document.body.style.overflow = '';

                    btn.focus();
                }
            }

            function getFocusable() {
                return Array.from(panel.querySelectorAll('a, button, input, select, textarea, [tabindex]:not([tabindex="-1"])'))
                    .filter(el => !el.hasAttribute('disabled') && el.getAttribute('aria-hidden') !== 'true' && el.offsetParent !== null);
            }

            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(!isOpen());
            });

            overlay.addEventListener('click', function () {
                if (isOpen()) setOpen(false);
            });

            panel.addEventListener('click', function (e) {
                const target = e.target;
                if (target && target.closest && target.closest('a')) {
                    setOpen(false);
                }
            });

            document.addEventListener('click', function (e) {
                if (!isOpen()) return;
                if (!panel.contains(e.target) && e.target !== btn) setOpen(false);
            });

            window.addEventListener('resize', function () {
                if (!isOpen()) return;
                positionPanel();
            });

            document.addEventListener('keydown', function (e) {
                if (!isOpen()) return;

                if (e.key === 'Escape') {
                    e.preventDefault();
                    setOpen(false);
                    return;
                }

                if (e.key !== 'Tab') return;

                const focusables = getFocusable();
                if (focusables.length === 0) return;

                const first = focusables[0];
                const last = focusables[focusables.length - 1];

                if (e.shiftKey && document.activeElement === first) {
                    e.preventDefault();
                    last.focus();
                } else if (!e.shiftKey && document.activeElement === last) {
                    e.preventDefault();
                    first.focus();
                }
            });
        })();
    </script>

</nav>
