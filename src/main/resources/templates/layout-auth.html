<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="authLayout(content)">

<head th:replace="~{fragments/head :: head(${pageTitle != null ? pageTitle : 'MagicLibrary'})}"></head>

<body class="min-h-screen bg-slate-100 overflow-x-hidden">

<a href="#main"
   class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50
          rounded-md bg-white px-3 py-2 text-sm font-medium text-slate-900 shadow
          ring-1 ring-slate-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-900">
    Aller au contenu principal
</a>

<main id="main" role="main" tabindex="-1"
      class="min-h-screen flex items-start sm:items-center justify-center px-2 py-4 sm:py-10">
    <th:block th:replace="${content}">
        <section class="w-full max-w-md">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-8">
                <h1 class="text-lg font-semibold text-slate-900">Contenu indisponible</h1>
                <p class="mt-2 text-sm text-slate-600">Aucune section n’a été injectée dans le layout.</p>
            </div>
        </section>
    </th:block>
</main>

</body>
</html>
