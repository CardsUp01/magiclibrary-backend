# ============================================================================
# APPLICATION
# ============================================================================
# Nom technique de l'application utilisé pour les démonstrations.
# ============================================================================

spring.application.name=magiclibrary_demo

# ============================================================================
# SERVEUR WEB
# ============================================================================
# Port utilisé pour les démonstrations locales.
# ============================================================================

server.port=8080

# ============================================================================
# BASE DE DONNÉES MARIA DB
# ============================================================================
# Base de démonstration utilisée pour les recruteurs et le portfolio.
# ============================================================================

spring.datasource.url=jdbc:mariadb://localhost:3306/magiclibrary_demo?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ============================================================================
# JPA / HIBERNATE
# ============================================================================
# La structure existe déjŕ.
# Hibernate ne doit pas modifier automatiquement le schéma.
# ============================================================================

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ============================================================================
# JOURNALISATION
# ============================================================================
# Niveau intermédiaire adapté aux démonstrations.
# ============================================================================

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

# ============================================================================
# GESTION DES ERREURS
# ============================================================================
# Limite les informations techniques affichées.
# ============================================================================

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================================================
# MONGODB
# ============================================================================
# Base NoSQL utilisée pour les démonstrations.
# ============================================================================

spring.data.mongodb.uri=mongodb://localhost:27017/magiclibrary_demo_nosql

# ============================================================================
# JWT
# ============================================================================
# Paramčtres de démonstration.
# ============================================================================

spring.app.jwt.secret=MagicLibraryDemoSecretKey_2026_VeryLongAndSecure
spring.app.jwt.expiration=86400000
spring.app.jwt.expirationRememberMe=604800000

# ============================================================================
# REMEMBER ME
# ============================================================================
# Clé dédiée ŕ l'environnement DEMO.
# ============================================================================

spring.app.security.remember-me.key=MagicLibraryRememberMeKey_Demo_2026_StrongValue

# ============================================================================
# DOCUMENTATION API
# ============================================================================
# Swagger reste désactivé comme en production.
# ============================================================================

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ============================================================================
# INITIALISATION DES COMPTES DE DÉMONSTRATION
# ============================================================================

ADMIN_EMAIL=admin@example.com
ADMIN_PASSWORD=Admin123!
DEMO_MEMBER_PASSWORD=Demo123!